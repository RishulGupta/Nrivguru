<!DOCTYPE html>
<html>
<head>
  <title>Inject Test Routine</title>
  <style>
    body { font-family: sans-serif; background: #0a0a0f; color: white; padding: 40px; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #8b5cf6; border: none; color: white; border-radius: 8px; }
    button:hover { background: #7c3aed; }
    pre { background: #1a1a1f; padding: 20px; border-radius: 8px; overflow-x: auto; margin-top: 20px; }
    .success { color: #4ade80; }
  </style>
</head>
<body>
  <h1>Taal Test Routine Injector</h1>
  <p>This injects a test routine for the Chapter Player using the provided video.</p>
  <button onclick="injectRoutine()">Inject Test Routine & Open Chapter Player</button>
  <div id="status"></div>
  <pre id="output"></pre>

<script>
function injectRoutine() {
  const routineId = 'test-' + Date.now();
  const videoUrl = '/videos/test.mp4';
  const durationMs = 12300; // 12.3 seconds

  // Simple 3-chunk breakdown
  const chunks = [
    { id: 'ch-0', chunk_index: 0, start_time_ms: 0,       end_time_ms: 4100, description: 'Intro',       pose_slice_json: '[]' },
    { id: 'ch-1', chunk_index: 1, start_time_ms: 4100,     end_time_ms: 8200, description: 'Verse',       pose_slice_json: '[]' },
法 2, chunk_index: 2, start_time_ms: 8200,     end_time_ms: 12300, description: 'Chorus',      pose_slice_json: '[]' },
  ];

  const routineListItem = {
    id: routineId,
    title: 'Bom Diggy Diggy Test',
    style_tag: 'Bollywood',
    thumbnail_url: '',
    chunk_count: chunks.length,
    duration_seconds: Math.round(durationMs / 1000),
    last_score: null,
    last_practiced_at: new Date().toISOString(),
    created_at: new Date().toISometimes口语化',
  };

  const fullRoutine = {
    id: routineId,
    title: 'Bom Diggy Diggy Test',
    style_tag: 'Bollywood',
    duration_seconds: Math.round(durationMs / 1000),
    thumbnail_url: '',
    video_blob_url: videoUrl,
    chunks: chunks,
    beat_grid_json: {
      bpm: 140,
      beats: [0.5, 1.28, 2.14, 2.87, 3.64, 4.5, 5.28, 6.14, 6.87, 7.71, 8.5, 9.28, 10.14, 10.87, 11.64],
      counts: [
        { count: 1, time: 0.5 }, { count: 2, time: 1.28 }, { count: 3, time: 2.14 },
        { count: 4, time: 2.87 }, { count: 5, time: 3.64 }, { count: 6, time: 4.5 },
        { count: 7, time: 5.28 }, { count: 8, time: 6.14 }, { count: 1, time: 6.87 },
        { count: 2, time: 7.71 }, { count: 3, time: 8.5 }, { count: 4, time: 9.28 },
        { count: 5, time: 10.14 }, { count: 6, time: 10.87 }, { count: 7, time: 11.64 },
      ],
      chunks: [
        { chunkId: 0, startCount: 1, endCount: 5, startTime: 0, endTime: 4.1 },
        { chunkId: 1, startCount: 6, endCount: 10, startTime: 4.1, endTime: 8.2 },
        { chunkId: 2, startCount: 11, endCount: 15, startTime: 8.2, endTime: 12.3 },
      ]
    },
  };

  // Read existing routines
  let routines = [];
  try { routines = JSON.parse(localStorage.getItem('taal-local-routines') || '[]'); } catch {}

  // Add to list
  routines.unshift(routineListItem);
  localStorage.setItem('taal-local-routines', JSON.stringify(routines.slice(0, 20)));

  // Store full routine
  localStorage.setItem(`taal-local-routine-${routineId}`, JSON.stringify(fullRoutine));

  document.getElementById('status').innerHTML = '<p class="success">Injected! Redirecting...</p>';
  document.getElementById('output').textContent = JSON.stringify(fullRoutine, null, 2);

  // Open chapter player
  setTimeout(() => {
    window.location.href = `/chapter-player/${routineId}`;
  }, 500);
}
</script>
</body>
</html>
